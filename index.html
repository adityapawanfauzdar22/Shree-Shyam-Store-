<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shree Shyam Store</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#fdfbfb,#ebedee);
overflow-x:hidden;
}

/* Store Name */
.store-name{
text-align:center;
font-size:26px;
font-weight:bold;
padding:10px;
color:#ff5722;
}

/* Banner */
.banner{
background:linear-gradient(90deg,#ff9800,#ff3d00);
color:white;text-align:center;
padding:10px;
}

/* Header */
.header{
display:flex;
justify-content:space-between;
padding:10px;
background:white;
}

.search{
width:70%;
padding:8px;
border-radius:10px;
border:1px solid #ccc;
}

/* Product */
.product{
background:white;
margin:12px;
padding:12px;
border-radius:15px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
text-align:center;
}

.product img{
width:100px;
height:100px;
object-fit:cover;
}

/* Button */
button{
background:#ff9800;
color:white;
border:none;
padding:6px 12px;
margin:5px;
border-radius:10px;
}

/* Cart */
#cart{
position:fixed;
right:0;
top:0;
width:260px;
height:100%;
background:white;
border-left:2px solid #ddd;
padding:10px;
}

/* Petals */
.petal{
position:fixed;
top:-10px;
animation:fall 8s linear infinite;
}

@keyframes fall{
to{transform:translateY(100vh);}
}
</style>

</head>

<body>

<div class="store-name">🛍️ Shree Shyam Store</div>

<div class="banner">🎉 20% Discount on Your First Order</div>

<div class="header">
<input class="search" placeholder="Search..." onkeyup="searchProduct(this.value)">
<button onclick="login()">Admin</button>
</div>

<div id="products"></div>

<div id="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<h4>Total: ₹<span id="total">0</span></h4>
<button onclick="order()">Order</button>
</div>

<script>

let products=[
{
name:"Hammer",
price:200,
detail:"Strong steel hammer",
img:"https://cdn-icons-png.flaticon.com/512/2965/2965567.png"
},
{
name:"Drill Machine",
price:1500,
detail:"Heavy duty drill",
img:"https://cdn-icons-png.flaticon.com/512/1037/1037500.png"
}
];

let cart=[];
let isAdmin=false;

/* Login */
function login(){
let pass=prompt("Enter Password");
if(pass=="280688"){
isAdmin=true;
alert("Admin Mode ON");
render();
}
}

/* Add product */
function addProduct(){
let name=prompt("Name");
let price=prompt("Price");
let detail=prompt("Details");
products.push({
name,price,detail,
img:"https://cdn-icons-png.flaticon.com/512/1046/1046857.png"
});
render();
}

/* Delete */
function deleteProduct(i){
products.splice(i,1);
render();
}

/* Render */
function render(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="product">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button onclick="addToCart(${i})">Add to Cart</button>

<details><summary>Details</summary>${p.detail}</details>

${isAdmin?`<button onclick="deleteProduct(${i})">Delete</button>`:""}

</div>`;
});

if(isAdmin) html+=`<button onclick="addProduct()">+ Add Product</button>`;

productsDiv.innerHTML=html;
}

/* Cart */
function addToCart(i){
cart.push({...products[i],qty:1});
updateCart();
}

function updateCart(){
let html="";
let total=0;

cart.forEach((c,i)=>{
total+=c.price*c.qty;
html+=`${c.name} x${c.qty}
<button onclick="inc(${i})">+</button>
<button onclick="dec(${i})">-</button><br>`;
});

cartItems.innerHTML=html;
totalSpan.innerText=total;
}

function inc(i){cart[i].qty++;updateCart();}
function dec(i){
if(cart[i].qty>1)cart[i].qty--;
else cart.splice(i,1);
updateCart();
}

/* WhatsApp */
function order(){
let msg="Order:%0A";
cart.forEach(c=>msg+=c.name+" x"+c.qty+"%0A");
window.open("https://wa.me/919694725220?text="+msg);
}

/* Search */
function searchProduct(val){
let filtered=products.filter(p=>p.name.toLowerCase().includes(val.toLowerCase()));
let html="";
filtered.forEach(p=>{
html+=`<div class="product">${p.name} ₹${p.price}</div>`;
});
productsDiv.innerHTML=html;
}

/* Petals */
setInterval(()=>{
let p=document.createElement("div");
p.className="petal";
p.innerText="🌸";
p.style.left=Math.random()*100+"%";
document.body.appendChild(p);
setTimeout(()=>p.remove(),8000);
},400);

let productsDiv=document.getElementById("products");
let cartItems=document.getElementById("cartItems");
let totalSpan=document.getElementById("total");

render();

</script>

</body>
</html>
