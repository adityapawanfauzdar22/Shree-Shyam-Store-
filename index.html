<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shree Shyam Store FINAL MAX</title>

<style>
body{margin:0;font-family:Arial;background:#f6f9f7;overflow-x:hidden;}
.navbar{display:flex;justify-content:space-between;padding:15px;background:#fff;}
.banner{margin:10px;padding:15px;background:linear-gradient(to right,#ff9800,#ff5722);color:white;border-radius:10px;text-align:center;font-weight:bold;}
.container{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;padding:10px;}
.product{background:white;padding:10px;border-radius:10px;text-align:center;}
.btn{background:#2e7d32;color:white;border:none;padding:6px;border-radius:10px;margin:3px;cursor:pointer;}
.cart{position:fixed;right:0;top:0;width:300px;height:100%;background:white;display:none;padding:10px;overflow:auto;}
.cart-btn{position:fixed;bottom:20px;right:20px;background:black;color:white;padding:15px;border-radius:50%;}
.admin{display:none;padding:10px;}
.welcome{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:15px;z-index:999;}
.fall{position:fixed;animation:fall linear;}
@keyframes fall{0%{top:-50px;}100%{top:100vh;}}
</style>
</head>

<body>

<div class="welcome" id="welcome">
🙏 Welcome 🙏<br>Shree Krishna Bless You
</div>

<div class="navbar">
<h3>🛒 Shree Shyam Store</h3>
<input id="search" placeholder="Search..." onkeyup="search()">
<button onclick="adminLogin()">⚙️</button>
</div>

<div class="banner">
🔥 20% Discount on your first order 🔥
</div>

<div class="admin" id="adminPanel">
<input id="name" placeholder="Name"><br>
<input id="price" placeholder="Price"><br>
<input type="file" id="img"><br>
<button class="btn" onclick="addProduct()">Add Product</button>
</div>

<div class="container" id="products"></div>

<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="cart" id="cart">
<button onclick="toggleCart()">⬅ Back</button>
<h3>Cart</h3>
<ul id="cartItems"></ul>
<h4 id="total"></h4>
<button class="btn" onclick="order()">Purchase</button>
</div>

<script>
setTimeout(()=>{document.getElementById("welcome").style.display="none";},3000);

let PASSWORD="280688";
let isAdmin=false;
let products=JSON.parse(localStorage.getItem("products"))||[];
let cart=JSON.parse(localStorage.getItem("cart"))||[];

function adminLogin(){
 let p=prompt("Enter Admin Password");
 if(p===PASSWORD){
  isAdmin=true;
  document.getElementById("adminPanel").style.display="block";
  display();
 }
}

function addProduct(){
 let name=document.getElementById("name").value;
 let price=document.getElementById("price").value;
 let file=document.getElementById("img").files[0];
 let reader=new FileReader();
 reader.onload=function(){
  products.push({name,price,img:reader.result});
  localStorage.setItem("products",JSON.stringify(products));
  display();
 }
 if(file) reader.readAsDataURL(file);
}

function deleteProduct(i){
 products.splice(i,1);
 localStorage.setItem("products",JSON.stringify(products));
 display();
}

function display(){
 let c=document.getElementById("products");
 c.innerHTML="";
 products.forEach((p,i)=>{
  c.innerHTML+=`
  <div class="product">
  <img src="${p.img}" width="100">
  <h4>${p.name}</h4>
  <p>₹${p.price}</p>
  <button class="btn" onclick="animateAdd(${i})">Add</button>
  ${isAdmin ? `<button class="btn" onclick="deleteProduct(${i})">Delete</button>` : ``}
  </div>`;
 });
}

function animateAdd(i){
 let el=document.createElement("div");
 el.innerText="🛒";
 el.style.position="fixed";
 el.style.left="50%";
 el.style.top="50%";
 el.style.transition="1s";
 document.body.appendChild(el);
 setTimeout(()=>{el.style.left="90%";el.style.top="10%";},100);
 setTimeout(()=>{document.body.removeChild(el);addToCart(i);},1000);
}

function addToCart(i){
 let item=products[i];
 let found=cart.find(c=>c.name===item.name);
 if(found){found.qty++;}
 else{cart.push({...item,qty:1});}
 localStorage.setItem("cart",JSON.stringify(cart));
 updateCart();
}

function changeQty(i,delta){
 cart[i].qty+=delta;
 if(cart[i].qty<=0) cart.splice(i,1);
 localStorage.setItem("cart",JSON.stringify(cart));
 updateCart();
}

function updateCart(){
 let list=document.getElementById("cartItems");
 list.innerHTML="";
 let total=0;
 cart.forEach((item,i)=>{
  total+=item.price*item.qty;
  list.innerHTML+=`<li>${item.name} x ${item.qty} = ₹${item.price*item.qty}
  <button onclick="changeQty(${i},1)">+</button>
  <button onclick="changeQty(${i},-1)">-</button></li>`;
 });
 document.getElementById("total").innerText="Total: ₹"+total;
}

function toggleCart(){
 let c=document.getElementById("cart");
 c.style.display=c.style.display==="block"?"none":"block";
}

function order(){
 let msg="Order:%0A";
 cart.forEach(i=>{
  msg+=i.name+" x "+i.qty+"%0A";
 });
 window.open("https://wa.me/919694725220?text="+msg);
}

function search(){
 let val=document.getElementById("search").value.toLowerCase();
 document.querySelectorAll(".product").forEach(card=>{
  card.style.display=card.innerText.toLowerCase().includes(val)?"block":"none";
 });
}

setInterval(()=>{
 let f=document.createElement("div");
 f.className="fall";
 f.style.left=Math.random()*100+"%";
 f.style.animationDuration="5s";
 f.innerText=Math.random()>0.5?"🪶":"🌸";
 document.body.appendChild(f);
 setTimeout(()=>document.body.removeChild(f),5000);
},500);

display();
updateCart();
</script>

</body>
</html>
